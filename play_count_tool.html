<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" href="favicon.ico">
<title>プレイ回数カウンター</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700&family=JetBrains+Mono:wght@400;600&display=swap');

  :root {
    --bg: #0d0f14;
    --surface: #161923;
    --surface2: #1e2330;
    --border: #2a3045;
    --accent: #4f8cff;
    --accent2: #a78bfa;
    --success: #34d399;
    --warn: #fbbf24;
    --danger: #f87171;
    --text: #e2e8f0;
    --text-muted: #64748b;
    --text-dim: #94a3b8;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Noto Sans JP', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 40px 20px;
  }

  .header {
    text-align: center;
    margin-bottom: 40px;
  }

  .header h1 {
    font-size: 1.8rem;
    font-weight: 700;
    letter-spacing: 0.05em;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    margin-bottom: 6px;
  }

  .header p {
    font-size: 0.85rem;
    color: var(--text-muted);
  }

  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 32px;
    width: 100%;
    max-width: 640px;
    margin-bottom: 24px;
  }

  .card-title {
    font-size: 0.75rem;
    font-weight: 500;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 20px;
  }

  .field {
    margin-bottom: 18px;
  }

  label {
    display: block;
    font-size: 0.8rem;
    color: var(--text-dim);
    margin-bottom: 6px;
    font-weight: 500;
  }

  input[type="text"] {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 14px;
    color: var(--text);
    font-family: inherit;
    font-size: 0.9rem;
    transition: border-color 0.2s;
    outline: none;
  }

  input:focus {
    border-color: var(--accent);
  }

  /* 検索モード切替タブ */
  .search-tabs {
    display: flex;
    gap: 0;
    margin-bottom: 16px;
    background: var(--surface2);
    border-radius: 8px;
    padding: 3px;
  }

  .tab-btn {
    flex: 1;
    padding: 7px 12px;
    border: none;
    border-radius: 6px;
    background: transparent;
    color: var(--text-muted);
    font-family: inherit;
    font-size: 0.82rem;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.18s;
  }

  .tab-btn.active {
    background: var(--accent);
    color: #fff;
  }

  /* 時刻テキスト入力 */
  .time-text-wrap {
    position: relative;
  }

  .time-text-input {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 14px;
    padding-right: 88px;
    color: var(--text);
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.83rem;
    transition: border-color 0.2s;
    outline: none;
  }

  .time-text-input:focus { border-color: var(--accent); }
  .time-text-input.ok    { border-color: var(--success); }
  .time-text-input.err   { border-color: var(--danger); }

  .time-parsed-badge {
    position: absolute;
    right: 10px;
    top: 50%;
    transform: translateY(-50%);
    font-size: 0.68rem;
    padding: 2px 8px;
    border-radius: 4px;
    font-family: inherit;
    pointer-events: none;
    white-space: nowrap;
  }

  .time-note {
    font-size: 0.72rem;
    color: var(--text-muted);
    margin-top: 4px;
  }

  .time-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 14px;
  }

  .file-area {
    background: var(--surface2);
    border: 2px dashed var(--border);
    border-radius: 10px;
    padding: 24px;
    text-align: center;
    cursor: pointer;
    transition: border-color 0.2s, background 0.2s;
    position: relative;
  }

  .file-area:hover, .file-area.drag-over {
    border-color: var(--accent);
    background: rgba(79, 140, 255, 0.05);
  }

  .file-area input[type="file"] {
    position: absolute;
    inset: 0;
    opacity: 0;
    cursor: pointer;
    width: 100%;
    height: 100%;
  }

  .file-icon { font-size: 1.8rem; margin-bottom: 8px; }
  .file-label { font-size: 0.85rem; color: var(--text-dim); }
  .file-name { font-size: 0.8rem; color: var(--success); margin-top: 6px; font-family: 'JetBrains Mono', monospace; }

  .btn {
    width: 100%;
    padding: 13px;
    border: none;
    border-radius: 10px;
    font-family: inherit;
    font-size: 0.9rem;
    font-weight: 700;
    cursor: pointer;
    transition: opacity 0.2s, transform 0.1s;
    letter-spacing: 0.05em;
  }

  .btn:active { transform: scale(0.98); }
  .btn:disabled { opacity: 0.4; cursor: not-allowed; }

  .btn-primary {
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    color: #fff;
  }

  .btn-primary:not(:disabled):hover { opacity: 0.9; }

  /* Result */
  .result-card {
    display: none;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 32px;
    width: 100%;
    max-width: 640px;
    animation: fadeIn 0.3s ease;
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(8px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .result-card.show { display: block; }

  .result-hero {
    text-align: center;
    padding: 20px 0 24px;
    border-bottom: 1px solid var(--border);
    margin-bottom: 24px;
  }

  .result-hero .player-name {
    font-size: 1.2rem;
    font-weight: 700;
    color: var(--accent2);
    margin-bottom: 12px;
  }

  .count-display {
    display: inline-flex;
    align-items: baseline;
    gap: 6px;
  }

  .count-num {
    font-family: 'JetBrains Mono', monospace;
    font-size: 4rem;
    font-weight: 600;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    line-height: 1;
  }

  .count-unit {
    font-size: 1.1rem;
    color: var(--text-dim);
  }

  .meta-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    margin-bottom: 20px;
  }

  .meta-item {
    background: var(--surface2);
    border-radius: 8px;
    padding: 12px 14px;
  }

  .meta-label {
    font-size: 0.7rem;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 0.08em;
    margin-bottom: 4px;
  }

  .meta-value {
    font-size: 0.85rem;
    font-family: 'JetBrains Mono', monospace;
    color: var(--text);
    word-break: break-all;
  }

  .plays-list {
    margin-top: 4px;
  }

  .plays-list-title {
    font-size: 0.75rem;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 0.08em;
    margin-bottom: 10px;
  }

  .play-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 9px 12px;
    border-radius: 8px;
    background: var(--surface2);
    margin-bottom: 6px;
    font-size: 0.82rem;
  }

  .play-num {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.7rem;
    color: var(--text-muted);
    min-width: 24px;
    text-align: right;
  }

  .play-time {
    font-family: 'JetBrains Mono', monospace;
    color: var(--accent);
    flex: 1;
  }

  .play-badge {
    font-size: 0.68rem;
    padding: 2px 8px;
    border-radius: 4px;
    font-weight: 500;
  }

  .badge-win  { background: rgba(52,211,153,0.15); color: var(--success); }
  .badge-lose { background: rgba(248,113,113,0.15); color: var(--danger); }
  .badge-unk  { background: rgba(100,116,139,0.15); color: var(--text-muted); }

  .error-msg {
    background: rgba(248,113,113,0.1);
    border: 1px solid rgba(248,113,113,0.3);
    border-radius: 8px;
    padding: 12px 16px;
    font-size: 0.85rem;
    color: var(--danger);
    margin-top: 16px;
    display: none;
  }

  .warn-box {
    background: rgba(251,191,36,0.08);
    border: 1px solid rgba(251,191,36,0.25);
    border-radius: 8px;
    padding: 10px 14px;
    font-size: 0.78rem;
    color: var(--warn);
    margin-bottom: 18px;
    display: none;
  }
</style>
</head>
<body>

<div class="header">
  <h1>🎮 プレイ回数カウンター</h1>
  <p>ブースCSVデータからプレイヤーのプレイ回数を自動集計します</p>
</div>

<div class="card">
  <div class="card-title">📂 CSVファイル</div>
  <div class="file-area" id="fileArea">
    <input type="file" id="csvFile" accept=".csv">
    <div class="file-icon">📄</div>
    <div class="file-label">CSVファイルをドロップ、またはクリックして選択</div>
    <div class="file-name" id="fileName"></div>
  </div>
</div>

<div class="card">
  <div class="card-title">🔍 検索条件</div>

  <div class="field">
    <label>検索モード</label>
    <div class="search-tabs">
      <button class="tab-btn active" id="tabName" onclick="switchTab('name')">プレイヤー名</button>
      <button class="tab-btn"        id="tabId"   onclick="switchTab('id')">プレイヤーID</button>
    </div>
    <div id="fieldName">
      <input type="text" id="playerName" placeholder="例: アァ〜ズベンニャ〜〜">
    </div>
    <div id="fieldId" style="display:none">
      <input type="text" id="playerId" placeholder="例: 2016711877215780865" style="font-family:'JetBrains Mono',monospace;font-size:0.85rem;">
    </div>
  </div>

  <div class="field time-row">
    <div>
      <label>プレイ開始時刻（JST）<span style="color:var(--text-muted); font-size:0.7rem; font-weight:normal; margin-left:4px;">※特定プレイを追う場合</span></label>
      <div class="time-text-wrap">
        <input type="text" class="time-text-input" id="startTime"
               placeholder="空欄で全期間対象"
               oninput="onTimeInput('startTime','startBadge')" autocomplete="off">
        <span class="time-parsed-badge" id="startBadge"></span>
      </div>
      <div class="time-note">管理パネルの時刻をそのままペースト可</div>
    </div>
    <div>
      <label>プレイ終了時刻（JST）<span style="color:var(--text-muted); font-size:0.7rem; font-weight:normal; margin-left:4px;">※任意</span></label>
      <div class="time-text-wrap">
        <input type="text" class="time-text-input" id="endTime"
               placeholder="空欄で全期間対象"
               oninput="onTimeInput('endTime','endBadge')" autocomplete="off">
        <span class="time-parsed-badge" id="endBadge"></span>
      </div>
      <div class="time-note">管理パネルの時刻をそのままペースト可</div>
    </div>
  </div>

  <div class="field">
    <label>時刻のズレ許容幅（秒）</label>
    <input type="text" id="tolerance" value="30" placeholder="30">
    <div class="time-note">記録時刻のズレを考慮するバッファ秒数（デフォルト: 30秒）</div>
  </div>

  <div class="error-msg" id="errorMsg"></div>

  <button class="btn btn-primary" id="runBtn" onclick="run()" style="margin-top:8px">
    集計する
  </button>
</div>

<div class="result-card" id="resultCard">
  <div class="card-title">📊 集計結果</div>
  <div class="warn-box" id="warnBox"></div>
  <div class="result-hero">
    <div class="player-name" id="rPlayerName"></div>
    <div class="count-display">
      <span class="count-num" id="rCount">0</span>
      <span class="count-unit">回</span>
    </div>
  </div>
  <div class="meta-grid">
    <div class="meta-item">
      <div class="meta-label">検索対象 (期間 または Room ID)</div>
      <div class="meta-value" id="rRange">—</div>
    </div>
    <div class="meta-item">
      <div class="meta-label">勝利 / 敗北</div>
      <div class="meta-value" id="rWinLose">—</div>
    </div>
  </div>
  <div class="plays-list">
    <div class="plays-list-title">各プレイ詳細</div>
    <div id="playsList"></div>
  </div>
</div>

<script>
let csvData = null;
let searchMode = 'name'; // 'name' | 'id'

function switchTab(mode) {
  searchMode = mode;
  document.getElementById('tabName').classList.toggle('active', mode === 'name');
  document.getElementById('tabId').classList.toggle('active',   mode === 'id');
  document.getElementById('fieldName').style.display = mode === 'name' ? '' : 'none';
  document.getElementById('fieldId').style.display   = mode === 'id'   ? '' : 'none';
}

document.getElementById('csvFile').addEventListener('change', e => {
  const file = e.target.files[0];
  if (!file) return;
  document.getElementById('fileName').textContent = file.name;
  const reader = new FileReader();
  reader.onload = ev => { csvData = ev.target.result; };
  reader.readAsText(file, 'UTF-8');
});

const fileArea = document.getElementById('fileArea');
fileArea.addEventListener('dragover', e => { e.preventDefault(); fileArea.classList.add('drag-over'); });
fileArea.addEventListener('dragleave', () => fileArea.classList.remove('drag-over'));
fileArea.addEventListener('drop', e => {
  e.preventDefault();
  fileArea.classList.remove('drag-over');
  const file = e.dataTransfer.files[0];
  if (!file) return;
  document.getElementById('fileName').textContent = file.name;
  const reader = new FileReader();
  reader.onload = ev => { csvData = ev.target.result; };
  reader.readAsText(file, 'UTF-8');
});

const MONTHS = {jan:0,feb:1,mar:2,apr:3,may:4,jun:5,jul:6,aug:7,sep:8,oct:9,nov:10,dec:11};

function parseTimeText(raw) {
  if (!raw || !raw.trim()) return null;
  const s = raw.trim();
  let d, mo, y, hh, mm, ss;

  const p1 = s.match(/^(\d{1,2})\s+([A-Za-z]{3})\s+(\d{4})\s+(\d{1,2}):(\d{2})(?::(\d{2}))?$/);
  if (p1) {
    d  = parseInt(p1[1]);
    mo = MONTHS[p1[2].toLowerCase()];
    y  = parseInt(p1[3]);
    hh = parseInt(p1[4]);
    mm = parseInt(p1[5]);
    ss = parseInt(p1[6] || '0');
    if (mo === undefined) return null;
    return new Date(Date.UTC(y, mo, d, hh - 9, mm, ss));
  }

  const p2 = s.match(/^(\d{4})[-\/](\d{2})[-\/](\d{2})[T\s](\d{1,2}):(\d{2})(?::(\d{2}))?$/);
  if (p2) {
    y  = parseInt(p2[1]);
    mo = parseInt(p2[2]) - 1;
    d  = parseInt(p2[3]);
    hh = parseInt(p2[4]);
    mm = parseInt(p2[5]);
    ss = parseInt(p2[6] || '0');
    return new Date(Date.UTC(y, mo, d, hh - 9, mm, ss));
  }
  return null;
}

function onTimeInput(inputId, badgeId) {
  const el    = document.getElementById(inputId);
  const badge = document.getElementById(badgeId);
  const utc   = parseTimeText(el.value);
  el.classList.remove('ok', 'err');
  if (!el.value.trim()) {
    badge.textContent = '';
    badge.style.background = '';
    badge.style.color = '';
    return;
  }
  if (utc) {
    const jst = new Date(utc.getTime() + 9 * 60 * 60 * 1000);
    const hh = String(jst.getUTCHours()).padStart(2,'0');
    const mm = String(jst.getUTCMinutes()).padStart(2,'0');
    const ss = String(jst.getUTCSeconds()).padStart(2,'0');
    badge.textContent = `✓ ${hh}:${mm}:${ss} JST`;
    badge.style.background = 'rgba(52,211,153,0.15)';
    badge.style.color = 'var(--success)';
    el.classList.add('ok');
  } else {
    badge.textContent = '× 認識不可';
    badge.style.background = 'rgba(248,113,113,0.15)';
    badge.style.color = 'var(--danger)';
    el.classList.add('err');
  }
}

function parseCSV(text) {
  const lines = text.split('\n').filter(l => l.trim());
  const rows = [];
  for (const line of lines) {
    const cols = [];
    let cur = '', inQ = false;
    for (let i = 0; i < line.length; i++) {
      const c = line[i];
      if (c === '"') { inQ = !inQ; }
      else if (c === ',' && !inQ) { cols.push(cur); cur = ''; }
      else { cur += c; }
    }
    cols.push(cur);
    rows.push(cols.map(c => c.trim().replace(/^"|"$/g, '')));
  }
  const header = rows[0];
  return rows.slice(1).map(r => {
    const obj = {};
    header.forEach((h, i) => obj[h] = r[i] || '');
    return obj;
  });
}

function extractPlayers(info) {
  const result = [];
  const re = /\{[^}]*'player_id'\s*:\s*'([^']+)'[^}]*'player_name'\s*:\s*'([^']+)'[^}]*\}|\{[^}]*'player_name'\s*:\s*'([^']+)'[^}]*'player_id'\s*:\s*'([^']+)'[^}]*\}/g;
  let m;
  while ((m = re.exec(info)) !== null) {
    if (m[1]) result.push({ id: m[1], name: m[2] });
    else       result.push({ id: m[4], name: m[3] });
  }
  return result;
}

function extractRoomId(info) {
  const m = info.match(/'room_id'\s*:\s*'([^']+)'/);
  return m ? m[1] : null;
}

function extractResult(info) {
  const m = info.match(/'result'\s*:\s*(\d+)/);
  return m ? parseInt(m[1]) : null;
}

function run() {
  const errEl = document.getElementById('errorMsg');
  errEl.style.display = 'none';

  const query    = searchMode === 'name'
    ? document.getElementById('playerName').value.trim()
    : document.getElementById('playerId').value.trim();
    
  const startRaw = document.getElementById('startTime').value.trim();
  const endRaw   = document.getElementById('endTime').value.trim();
  const startUTC = startRaw ? parseTimeText(startRaw) : null;
  const endUTC   = endRaw   ? parseTimeText(endRaw)   : null;
  
  const tolSec   = parseInt(document.getElementById('tolerance').value) || 30;

  if (!csvData)          { showErr('CSVファイルを選択してください。'); return; }
  if (!query)            { showErr(searchMode === 'name' ? 'プレイヤー名を入力してください。' : 'プレイヤーIDを入力してください。'); return; }
  
  if (startRaw && !startUTC) { showErr('開始時刻の形式が認識できません。'); return; }
  if (endRaw && !endUTC)     { showErr('終了時刻の形式が認識できません。'); return; }
  if (startUTC && endUTC && startUTC > endUTC) { showErr('開始時刻が終了時刻より後になっています。'); return; }

  const bufMs = tolSec * 1000;
  let rows;
  try { rows = parseCSV(csvData); } catch(e) { showErr('CSV の解析に失敗しました: ' + e.message); return; }

  const targetRooms = new Map();
  let foundRoomId = null; // 開始時刻が指定された場合に特定したroom_idを保持

  // 1. 対象のroom_idを特定する
  if (startUTC) {
    // 【開始時刻あり】指定時刻に最も近い PLAYING ログの room_id を1つだけ特定
    let closestDiff = Infinity;
    let matchedTarget = null;

    rows.forEach(r => {
      if (r.TYPE === 'PLAYING') {
        const players = extractPlayers(r.INFO);
        const target = searchMode === 'name'
          ? players.find(p => p.name === query)
          : players.find(p => p.id   === query);
        
        if (target) {
          const t = new Date(r.TIME).getTime();
          const diff = Math.abs(t - startUTC.getTime());
          // 許容幅の中で最も時刻が近いものを1つ選ぶ
          if (diff <= bufMs && diff < closestDiff) {
            closestDiff = diff;
            foundRoomId = extractRoomId(r.INFO);
            matchedTarget = target;
          }
        }
      }
    });

    if (foundRoomId) {
      targetRooms.set(foundRoomId, matchedTarget);
    }
  } else {
    // 【開始時刻なし】終了時刻（または全期間）までの全 PLAYING ログの room_id を収集
    const endHigh = endUTC ? new Date(endUTC.getTime() + bufMs) : new Date(8640000000000000);
    rows.forEach(r => {
      if (r.TYPE === 'PLAYING') {
        const players = extractPlayers(r.INFO);
        const target = searchMode === 'name'
          ? players.find(p => p.name === query)
          : players.find(p => p.id   === query);
        
        if (target) {
          const t = new Date(r.TIME);
          if (t <= endHigh) {
            const roomId = extractRoomId(r.INFO);
            if (roomId) targetRooms.set(roomId, target);
          }
        }
      }
    });
  }

  // 2. 抽出したroom_idに紐づくターンの終了(CONTROL_RECEIVED_END_RESULT)を集計
  const plays = [];
  rows.forEach(r => {
    if (r.TYPE === 'CONTROL_RECEIVED_END_RESULT') {
      const roomId = extractRoomId(r.INFO);
      if (roomId && targetRooms.has(roomId)) {
        // 開始時刻指定モードの場合は、そのセッションの全容が見たいはずなので終了時刻でのカットはしない
        // (終了時刻モードの場合は、終了時刻以降のログは弾く)
        const playTime = new Date(r.TIME);
        const endHigh = endUTC ? new Date(endUTC.getTime() + bufMs) : new Date(8640000000000000);
        if (startUTC || playTime <= endHigh) {
          const result = extractResult(r.INFO);
          const playTimeJST = new Date(playTime.getTime() + 9 * 60 * 60 * 1000);
          
          plays.push({
            timeJST: playTimeJST,
            roomId: roomId,
            result: result,
            target: targetRooms.get(roomId)
          });
        }
      }
    }
  });

  plays.sort((a, b) => a.timeJST - b.timeJST);
  plays.forEach((p, idx) => p.num = idx + 1);

  const winsCount = plays.filter(p => p.result === 1).length;
  const loseCount = plays.filter(p => p.result === 0).length;

  const firstTarget = plays.find(p => p.target)?.target;
  let nameDisplay = query;
  if (searchMode === 'id' && firstTarget) {
    nameDisplay = `${firstTarget.name}\n(${firstTarget.id})`;
  } else if (searchMode === 'name' && firstTarget) {
    nameDisplay = `${query}\n(ID: ${firstTarget.id})`;
  }
  const nameEl = document.getElementById('rPlayerName');
  nameEl.style.whiteSpace = 'pre-line';
  nameEl.textContent = nameDisplay;

  document.getElementById('rCount').textContent    = plays.length;
  document.getElementById('rWinLose').textContent  = `${winsCount}勝 / ${loseCount}敗`;

  const fmt = utcDate => {
    const jst = new Date(utcDate.getTime() + 9 * 60 * 60 * 1000);
    const Y  = jst.getUTCFullYear();
    const Mo = String(jst.getUTCMonth()+1).padStart(2,'0');
    const D  = String(jst.getUTCDate()).padStart(2,'0');
    const H  = String(jst.getUTCHours()).padStart(2,'0');
    const Mi = String(jst.getUTCMinutes()).padStart(2,'0');
    const S  = String(jst.getUTCSeconds()).padStart(2,'0');
    return `${Y}/${Mo}/${D} ${H}:${Mi}:${S}`;
  };

  // 検索対象の表示出し分け
  let rangeStr = '';
  if (startUTC) {
    if (foundRoomId) {
      rangeStr = `<span style="color:var(--accent)">Room ID: ${foundRoomId}</span><br><span style="font-size:0.75rem;color:var(--text-muted)">(${fmt(startUTC)} JST のプレイ)</span>`;
    } else {
      rangeStr = '一致するプレイなし';
    }
  } else {
    if (!startUTC && !endUTC) rangeStr = '全期間 (指定なし)';
    else if (!startUTC)       rangeStr = '〜 ' + fmt(endUTC) + ' JST';
  }
  document.getElementById('rRange').innerHTML = rangeStr;

  const warnBox = document.getElementById('warnBox');
  if (plays.length === 0) {
    warnBox.style.display = 'block';
    warnBox.textContent = '⚠ 条件に一致するプレイが見つかりませんでした。プレイヤー情報や時刻を確認してください。';
  } else {
    warnBox.style.display = 'none';
  }

  const listEl = document.getElementById('playsList');
  listEl.innerHTML = plays.map(p => {
    const badge = p.result === 1
      ? '<span class="play-badge badge-win">WIN</span>'
      : p.result === 0
        ? '<span class="play-badge badge-lose">LOSE</span>'
        : '<span class="play-badge badge-unk">—</span>';
    const utcEquiv = new Date(p.timeJST.getTime() - 9 * 60 * 60 * 1000);
    return `<div class="play-item">
      <span class="play-num">#${p.num}</span>
      <span class="play-time">${fmt(utcEquiv)}</span>
      ${badge}
    </div>`;
  }).join('');

  document.getElementById('resultCard').classList.add('show');
  document.getElementById('resultCard').scrollIntoView({ behavior: 'smooth', block: 'start' });
}

function showErr(msg) {
  const el = document.getElementById('errorMsg');
  el.textContent = msg;
  el.style.display = 'block';
}
</script>
</body>
</html>
