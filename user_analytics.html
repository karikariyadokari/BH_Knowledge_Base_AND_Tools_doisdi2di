<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Game Intelligence Dashboard | Pro V2</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <!-- 日付計算ライブラリ -->
    <script src="https://cdn.jsdelivr.net/npm/dayjs@1.11.7/dayjs.min.js"></script>
    <style>
        body { background-color: #0f172a; color: #e2e8f0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        .card { background-color: #1e293b; border: 1px solid #334155; border-radius: 12px; }
        .accent-blue { color: #38bdf8; }
        /* 入力フォームの視認性改善 */
        .input-field { 
            background-color: #334155; 
            border: 1px solid #475569; 
            color: #ffffff; 
            border-radius: 6px; 
            padding: 8px 12px;
            width: 100%;
            outline: none;
        }
        .input-field:focus { border-color: #38bdf8; box-shadow: 0 0 0 1px #38bdf8; }
        /* カレンダーアイコンを白くする(Webkit系) */
        ::-webkit-calendar-picker-indicator { filter: invert(1); cursor: pointer; }
    </style>
</head>
<body class="p-4 md:p-8">

    <div class="max-w-[1600px] mx-auto">
        <!-- Header -->
        <div class="flex flex-col md:flex-row justify-between items-start md:items-center mb-8 gap-4">
            <div>
                <h1 class="text-3xl font-extrabold tracking-tight">Game Intelligence <span class="accent-blue">Dashboard</span></h1>
                <p class="text-slate-400 text-sm mt-1">ユーザーアナリティクス</p>
            </div>
            <div class="flex items-center gap-4">
                <input type="file" id="csvFile" accept=".csv" class="text-sm text-slate-300 file:mr-4 file:py-2 file:px-4 file:rounded-md file:border-0 file:bg-sky-600 file:text-white hover:file:bg-sky-500 cursor-pointer">
            </div>
        </div>

        <!-- Filter Bar -->
        <div class="card p-6 mb-8 grid grid-cols-1 md:grid-cols-4 gap-6 items-end">
            <div>
                <label class="block text-sm font-bold text-slate-200 mb-2">レベル範囲</label>
                <div class="flex gap-2">
                    <input type="number" id="minLevel" value="1" class="input-field text-sm" placeholder="最小Lv">
                    <span class="text-slate-400 self-center">〜</span>
                    <input type="number" id="maxLevel" value="1000" class="input-field text-sm" placeholder="最大Lv">
                </div>
            </div>
            <div>
                <label class="block text-sm font-bold text-slate-200 mb-2">期間指定 (登録日)</label>
                <div class="flex gap-2">
                    <input type="date" id="startDate" class="input-field text-sm">
                    <span class="text-slate-400 self-center">〜</span>
                    <input type="date" id="endDate" class="input-field text-sm">
                </div>
            </div>
            <div>
                <label class="block text-sm font-bold text-slate-200 mb-2">ステータス</label>
                <select id="statusFilter" class="input-field text-sm">
                    <option value="ALL">すべて</option>
                    <option value="ACTIVE">ACTIVEのみ</option>
                    <option value="BANNED">BANNEDのみ</option>
                </select>
            </div>
            <button onclick="applyFilters()" class="bg-sky-600 hover:bg-sky-500 text-white font-bold py-2 px-6 rounded-md transition-all h-[38px] flex items-center justify-center">
                絞り込み適用
            </button>
        </div>

        <!-- KPI Cards -->
        <div id="kpiArea" class="grid grid-cols-1 md:grid-cols-4 gap-6 mb-8">
            <div class="card p-6 shadow-xl">
                <p class="text-slate-300 text-sm font-bold">分析対象ユーザー</p>
                <p id="kpi-count" class="text-4xl font-bold mt-2 text-white">-</p>
            </div>
            <div class="card p-6 shadow-xl border-l-4 border-sky-500">
                <p class="text-slate-300 text-sm font-bold">平均レベル</p>
                <p id="kpi-avg-lv" class="text-4xl font-bold mt-2 text-white">-</p>
            </div>
            <div class="card p-6 shadow-xl border-l-4 border-yellow-500">
                <p class="text-slate-300 text-sm font-bold">離脱リスク (10日経過＆Lv10以下)</p>
                <p id="kpi-risk" class="text-4xl font-bold mt-2 text-yellow-400">-</p>
            </div>
            <div class="card p-6 shadow-xl border-l-4 border-red-500">
                <p class="text-slate-300 text-sm font-bold">離脱状態 (20日経過＆Lv10以下)</p>
                <p id="kpi-churn" class="text-4xl font-bold mt-2 text-red-400">-</p>
            </div>
        </div>

        <!-- Charts Row 1 -->
        <div class="grid grid-cols-1 lg:grid-cols-2 gap-8 mb-8">
            <div class="card p-6">
                <h3 class="text-lg font-bold mb-4 flex items-center gap-2 text-white">
                    <span class="w-2 h-6 bg-sky-500 rounded"></span> レベル分布 (セグメント)
                </h3>
                <div class="h-[350px]">
                    <canvas id="levelChart"></canvas>
                </div>
            </div>
            <div class="card p-6">
                <h3 class="text-lg font-bold mb-4 flex items-center gap-2 text-white">
                    <span class="w-2 h-6 bg-emerald-500 rounded"></span> 新規登録トレンド
                </h3>
                <div class="h-[350px]">
                    <canvas id="trendChart"></canvas>
                </div>
            </div>
        </div>

        <!-- User Table -->
        <div class="card overflow-hidden">
            <div class="p-6 border-b border-slate-700 flex justify-between items-center bg-slate-800/80">
                <h3 class="text-lg font-bold text-white">ユーザーリスト（レベル降順）</h3>
                <span id="listCount" class="text-sm text-slate-300 font-medium bg-slate-700 px-3 py-1 rounded"></span>
            </div>
            <div class="overflow-x-auto max-h-[600px]">
                <table class="w-full text-left text-sm">
                    <thead class="bg-slate-900 text-slate-300 sticky top-0 z-10 shadow">
                        <tr>
                            <th class="px-6 py-4 font-bold border-b border-slate-700">NAME</th>
                            <th class="px-6 py-4 font-bold border-b border-slate-700">LEVEL ▼</th>
                            <th class="px-6 py-4 font-bold border-b border-slate-700">STATUS</th>
                            <th class="px-6 py-4 font-bold border-b border-slate-700">FIRST LOGIN</th>
                            <th class="px-6 py-4 font-bold border-b border-slate-700">経過日数</th>
                        </tr>
                    </thead>
                    <tbody id="userTableBody" class="divide-y divide-slate-700/50 text-slate-200">
                        <!-- Rows will be added by JS -->
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        let allData = [];
        let levelChart = null;
        let trendChart = null;

        // CSV読み込み処理
        document.getElementById('csvFile').addEventListener('change', e => {
            const file = e.target.files[0];
            Papa.parse(file, {
                header: true,
                skipEmptyLines: true,
                complete: results => {
                    allData = results.data.map(d => ({
                        ...d,
                        lvNum: parseInt(d.LEVEL?.replace('LEVEL_', '') || 0),
                        date: d['FIRST LOGIN AT'] ? dayjs(d['FIRST LOGIN AT']) : null
                    }));
                    
                    // カレンダーの初期値をデータ範囲に合わせる
                    const dates = allData.map(d => d.date).filter(d => d);
                    if(dates.length) {
                        document.getElementById('startDate').value = dayjs.min(dates).format('YYYY-MM-DD');
                        document.getElementById('endDate').value = dayjs.max(dates).format('YYYY-MM-DD');
                    }
                    applyFilters();
                }
            });
        });

        // 絞り込み処理
        function applyFilters() {
            if (!allData.length) return;

            const minLv = parseInt(document.getElementById('minLevel').value) || 0;
            const maxLv = parseInt(document.getElementById('maxLevel').value) || 9999;
            const startStr = document.getElementById('startDate').value;
            const endStr = document.getElementById('endDate').value;
            const statusFilt = document.getElementById('statusFilter').value;

            const filtered = allData.filter(d => {
                const lvMatch = d.lvNum >= minLv && d.lvNum <= maxLv;
                const statusMatch = statusFilt === 'ALL' || d.STATUS === statusFilt;
                let dateMatch = true;
                if(startStr && endStr && d.date) {
                    dateMatch = d.date.isAfter(dayjs(startStr).subtract(1, 'day')) && 
                                d.date.isBefore(dayjs(endStr).add(1, 'day'));
                }
                return lvMatch && statusMatch && dateMatch;
            });

            updateDashboard(filtered);
        }

        // ダッシュボード更新
        function updateDashboard(data) {
            const count = data.length;
            const avgLv = count ? (data.reduce((sum, d) => sum + d.lvNum, 0) / count).toFixed(1) : 0;
            
            const today = dayjs(); // 本日の日付
            let riskCount = 0;
            let churnCount = 0;

            // 離脱ロジックの判定
            data.forEach(d => {
                if (d.date && d.lvNum <= 10) {
                    const diffDays = today.diff(d.date, 'day');
                    if (diffDays >= 20) {
                        churnCount++; // 離脱状態
                    } else if (diffDays >= 10) {
                        riskCount++;  // 離脱リスク
                    }
                }
            });

            document.getElementById('kpi-count').innerText = count.toLocaleString() + ' 名';
            document.getElementById('kpi-avg-lv').innerText = `Lv. ${avgLv}`;
            document.getElementById('kpi-risk').innerText = `${riskCount} 名`;
            document.getElementById('kpi-churn').innerText = `${churnCount} 名`;

            renderLevelChart(data);
            renderTrendChart(data);
            renderTable(data, today);
        }

        // レベル分布グラフ
        function renderLevelChart(data) {
            const bins = { 'Lv 1': 0, 'Lv 2-10': 0, 'Lv 11-30': 0, 'Lv 31-50': 0, 'Lv 51-100': 0, 'Lv 101+': 0 };
            data.forEach(d => {
                if(d.lvNum === 1) bins['Lv 1']++;
                else if(d.lvNum <= 10) bins['Lv 2-10']++;
                else if(d.lvNum <= 30) bins['Lv 11-30']++;
                else if(d.lvNum <= 50) bins['Lv 31-50']++;
                else if(d.lvNum <= 100) bins['Lv 51-100']++;
                else bins['Lv 101+']++;
            });

            if(levelChart) levelChart.destroy();
            levelChart = new Chart(document.getElementById('levelChart'), {
                type: 'bar',
                data: {
                    labels: Object.keys(bins),
                    datasets: [{
                        label: 'ユーザー数',
                        data: Object.values(bins),
                        backgroundColor: '#38bdf8',
                        borderRadius: 4
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: { legend: { display: false } },
                    scales: {
                        y: { grid: { color: '#334155' }, ticks: { color: '#e2e8f0' } },
                        x: { grid: { display: false }, ticks: { color: '#e2e8f0' } }
                    }
                }
            });
        }

        // トレンドグラフ
        function renderTrendChart(data) {
            const daily = {};
            data.forEach(d => {
                if(d.date) {
                    const day = d.date.format('MM/DD');
                    daily[day] = (daily[day] || 0) + 1;
                }
            });

            const labels = Object.keys(daily).sort();
            const dailyCounts = labels.map(l => daily[l]);

            if(trendChart) trendChart.destroy();
            trendChart = new Chart(document.getElementById('trendChart'), {
                type: 'line',
                data: {
                    labels: labels,
                    datasets: [
                        { label: '新規登録数', data: dailyCounts, borderColor: '#10b981', backgroundColor: 'rgba(16, 185, 129, 0.2)', fill: true, tension: 0.2 }
                    ]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: { legend: { display: false } },
                    scales: {
                        y: { grid: { color: '#334155' }, ticks: { color: '#e2e8f0' } },
                        x: { grid: { display: false }, ticks: { color: '#e2e8f0' } }
                    }
                }
            });
        }

        // テーブル描画（レベル降順ソート）
        function renderTable(data, today) {
            const body = document.getElementById('userTableBody');
            body.innerHTML = '';
            
            // 全データをレベル降順でソート
            const sortedData = [...data].sort((a, b) => b.lvNum - a.lvNum);
            
            document.getElementById('listCount').innerText = `該当 ${sortedData.length}名 中、上位100名を表示`;
            
            sortedData.slice(0, 100).forEach(d => {
                const statusColor = d.STATUS === 'ACTIVE' ? 'text-emerald-400' : 'text-red-400';
                
                // 経過日数の計算とバッジ表示
                let daysText = '-';
                let riskBadge = '';
                if(d.date) {
                    const diffDays = today.diff(d.date, 'day');
                    daysText = `${diffDays}日`;
                    
                    // ユーザー行ごとの警告バッジ
                    if(d.lvNum <= 10) {
                        if(diffDays >= 20) {
                            riskBadge = `<span class="bg-red-900/50 text-red-300 border border-red-700 px-2 py-0.5 rounded text-xs ml-2">離脱状態</span>`;
                        } else if(diffDays >= 10) {
                            riskBadge = `<span class="bg-yellow-900/50 text-yellow-300 border border-yellow-700 px-2 py-0.5 rounded text-xs ml-2">リスク有</span>`;
                        }
                    }
                }

                const row = `
                    <tr class="hover:bg-slate-700/40 transition-colors">
                        <td class="px-6 py-3 font-medium">${d.NAME} ${riskBadge}</td>
                        <td class="px-6 py-3 font-bold text-sky-400">Lv. ${d.lvNum}</td>
                        <td class="px-6 py-3 font-bold ${statusColor}">${d.STATUS}</td>
                        <td class="px-6 py-3">${d['FIRST LOGIN AT'] || '-'}</td>
                        <td class="px-6 py-3 text-slate-400">${daysText}</td>
                    </tr>
                `;
                body.insertAdjacentHTML('beforeend', row);
            });
        }
    </script>
</body>
</html>
